<!DOCTYPE html>
<html lang="en-NZ">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Match Maid | Your availability</title>
    <link rel="icon" href="/favicon.ico" sizes="any" />
    <link rel="icon" href="/favicon.svg" type="image/svg+xml" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <link rel="manifest" href="/site.webmanifest" />
    <meta name="theme-color" content="#14B8A6" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;0,700;1,400;1,500;1,600&family=Manrope:wght@300;400;500;600;700;800&display=swap" />
    <link rel="stylesheet" href="styles.css?v=84" />
  </head>
  <body class="app-body">
    <header class="app-bar">
      <a class="brand" href="/"><img class="brand-mark" src="assets/logo-mark.svg" alt="Match Maid" /></a>
      <div class="app-bar-right">
        <span id="who" class="who"></span>
        <button class="btn ghost" id="logout" type="button">Log out</button>
      </div>
    </header>

    <main class="app-main">
      <section class="wizard-card">
        <p class="eyebrow">Your weekly availability</p>
        <h1>When can you clean?</h1>
        <p class="wizard-lede">
          Tap the times you're usually free. Customers are matched to you when they want a clean at
          a time you're available, so the more you mark, the more matches you'll get.
        </p>

        <div class="cal" id="cal"></div>

        <div class="save-row">
          <button class="btn solid" id="saveBtn" type="button">Save availability</button>
          <span class="save-msg" id="saveMsg" role="status"></span>
        </div>
      </section>
    </main>

    <script src="session.js?v=82"></script>
    <script src="availability.js"></script>
  </body>
</html>
