<!DOCTYPE html>
<html lang="en-NZ">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Match Maid | Maid portal</title>
    <link rel="icon" type="image/svg+xml" href="assets/logo-mark.svg" />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body class="app-body">
    <div class="notice-bar">
      🧽 We're building our database, more cleaners and homes to clean are coming soon.
    </div>
    <header class="app-bar">
      <a class="brand" href="/"><img class="brand-mark" src="assets/logo-mark.svg" alt="Match Maid" /></a>
      <div class="app-bar-right">
        <span id="who" class="who"></span>
        <a class="switch-side" id="adminLink" href="/admin" hidden>Admin</a>
        <a class="switch-side" href="/customer" id="switchSide">Customer portal</a>
        <button class="btn ghost" id="logout" type="button">Log out</button>
      </div>
    </header>

    <nav class="portal-tabs" id="tabs">
      <button class="portal-tab active" data-tab="overview" type="button">Overview</button>
      <button class="portal-tab" data-tab="availability" type="button">Availability</button>
      <button class="portal-tab" data-tab="enquiries" type="button">Enquiries</button>
      <button class="portal-tab" data-tab="messages" type="button">Messages</button>
      <button class="portal-tab" data-tab="profile" type="button">Profile</button>
      <button class="portal-tab" data-tab="subscription" type="button">Subscription</button>
    </nav>

    <main class="app-main wide">
      <div id="panel"></div>
    </main>

    <div class="modal-overlay" id="clientModal" hidden>
      <div class="modal">
        <button class="modal-close" id="clientModalClose" aria-label="Close">×</button>
        <div id="clientModalBody"></div>
      </div>
    </div>

    <footer class="portal-footer">
      <div class="pf-inner">
        <span class="pf-brand">Match Maid</span>
        <nav class="pf-links">
          <a href="/for-maids">For maids</a>
          <a href="/for-customers">For customers</a>
          <a href="/browse">Browse cleaners</a>
        </nav>
        <span class="pf-copy">© <span class="pf-year"></span> Match Maid · Christchurch, NZ</span>
      </div>
    </footer>
    <script>document.querySelector('.pf-year').textContent = new Date().getFullYear();</script>

    <script src="session.js"></script>
    <script src="demo.js"></script>
    <!-- Optional: in-browser OCR to read uploaded ID docs (loads on demand). -->
    <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js" defer></script>
    <script src="maid.js?v=39"></script>
  </body>
</html>
