<!DOCTYPE html>
<html lang="en-NZ">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Match Maid | Maid portal</title>
    <link rel="icon" type="image/svg+xml" href="assets/logo-mark.svg" />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body class="app-body">
    <div class="notice-bar">
      🧽 We're building our database, more cleaners and homes to clean are coming soon.
    </div>
    <header class="app-bar">
      <a class="brand" href="/"><img class="brand-mark" src="assets/logo-mark.svg" alt="Match Maid" /></a>
      <div class="app-bar-right">
        <span id="who" class="who"></span>
        <a class="switch-side" href="/customer" id="switchSide">Looking for a maid? Click here</a>
        <button class="btn ghost" id="logout" type="button">Log out</button>
      </div>
    </header>

    <nav class="portal-tabs" id="tabs">
      <button class="portal-tab active" data-tab="overview" type="button">Overview</button>
      <button class="portal-tab" data-tab="availability" type="button">Availability</button>
      <button class="portal-tab" data-tab="enquiries" type="button">Enquiries</button>
      <button class="portal-tab" data-tab="messages" type="button">Messages</button>
      <button class="portal-tab" data-tab="profile" type="button">Profile</button>
      <button class="portal-tab" data-tab="subscription" type="button">Subscription</button>
    </nav>

    <main class="app-main wide">
      <div id="panel"></div>
    </main>

    <script src="session.js"></script>
    <script src="demo.js"></script>
    <script src="maid.js"></script>
  </body>
</html>
