name: Keep Render awake

# Render's free plan idles a service out after 15 minutes with no traffic, and
# the cold start that follows costs a visitor ~50 seconds. Scheduled runs are
# queued, not guaranteed, and GitHub routinely delays them past the 15-minute
# window, so ping every 5 minutes to leave room for the drift.
on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping /healthz
        run: |
          for attempt in 1 2 3; do
            # A sleeping service answers only once it has booted, so allow the
            # full cold start before calling it a failure.
            code=$(curl -sS -o /dev/null -w '%{http_code}' --max-time 90 \
              https://matchmaid.onrender.com/healthz) && [ "$code" = 200 ] && {
              echo "awake (HTTP $code)"; exit 0; }
            echo "attempt $attempt: HTTP ${code:-no response}"
            sleep 15
          done
          echo "::error::matchmaid.onrender.com did not answer /healthz"
          exit 1
