# Render.com deployment for Match Maid (Node server that also serves the
# static front-end). Import this repo in Render and it reads this file.
services:
  - type: web
    name: matchmaid
    runtime: node
    plan: free
    # No rootDir: keep Render watching the WHOLE repo so root-level static
    # changes (pages, styles, portal JS) trigger a deploy. We cd into server/
    # for the Node build instead.
    buildCommand: cd server && npm install
    startCommand: cd server && node server.js
    envVars:
      - key: NODE_VERSION
        value: "20"
      - key: DATABASE_URL
        sync: false # set this in the Render dashboard (your Neon connection string)
