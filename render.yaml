# Render.com deployment for Match Maid (Node server that also serves the
# static front-end). Import this repo in Render and it reads this file.
services:
  - type: web
    name: matchmaid
    runtime: node
    plan: free
    # No rootDir: keep Render watching the WHOLE repo so root-level static
    # changes (pages, styles, portal JS) trigger a deploy. We cd into server/
    # for the Node build instead.
    buildCommand: cd server && npm install
    startCommand: cd server && node server.js
    envVars:
      - key: NODE_VERSION
        value: "20"
      - key: DATABASE_URL
        sync: false # set this in the Render dashboard (your Neon connection string)
      # Not a secret, but it MUST be set: server.js only checks that a Google
      # token was issued for THIS app when this is present. Unset, it accepts a
      # valid token minted for any other Google OAuth client.
      # Shared with the CRON_SECRET repository secret in GitHub Actions, which
      # is the only caller of /api/tasks/post-review-prompts. Unset, that
      # endpoint refuses every request (503) rather than running unguarded.
      - key: CRON_SECRET
        sync: false # set this in the Render dashboard
      - key: GOOGLE_CLIENT_ID
        value: "855738513392-oearkirn5kqjga0oq7q8emti7p7m8id8.apps.googleusercontent.com"
