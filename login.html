<!DOCTYPE html>
<html lang="en-NZ">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Match Maid | Sign in</title>
    <link rel="icon" type="image/svg+xml" href="assets/logo-mark.svg" />
    <link rel="stylesheet" href="styles.css?v=82" />
  </head>
  <body class="auth-body">
    <div class="auth-wrap">
      <a class="brand" href="/"><img class="brand-mark" src="assets/logo-mark.svg" alt="Match Maid" /></a>

      <div class="auth-card">
        <p class="auth-role serif" id="roleLabel"></p>
        <p class="auth-sub" id="roleBlurb"></p>

        <form id="authForm" novalidate>
          <label class="field" data-signup-only>
            <span>Full name</span>
            <input name="fullName" type="text" autocomplete="name" placeholder="Alex Taylor" />
          </label>
          <label class="field">
            <span>Email</span>
            <input name="email" type="email" autocomplete="email" placeholder="you@example.com" required />
          </label>
          <label class="field">
            <span>Password</span>
            <input name="password" type="password" autocomplete="current-password" placeholder="••••••••" required />
          </label>
          <!-- Maids only: an unknown code is ignored, never blocks the signup. -->
          <label class="field" data-signup-only data-maid-only>
            <span>Referral code (optional)</span>
            <input name="referralCode" type="text" autocomplete="off" placeholder="e.g. K7QW2M" />
          </label>

          <button class="btn solid lg full" type="submit" id="submitBtn">Log in</button>
          <p class="auth-msg" id="msg" role="status"></p>
        </form>

        <div class="auth-divider"><span>or</span></div>
        <div class="google-btn" id="googleBtn"></div>

        <p class="auth-switch">
          <span id="switchText">New to Match Maid?</span>
          <button type="button" class="linklike" id="switchMode">Create an account</button>
        </p>
        <p class="auth-switch">
          <span id="roleSwitchText"></span>
          <a class="linklike" id="roleSwitchLink" href="/">​</a>
        </p>
      </div>

      <a class="back" href="/">Back to home</a>
      <p class="auth-legal"><a href="/privacy">Privacy Policy</a> · <a href="/terms">Terms of Service</a></p>
    </div>

    <!-- The OAuth Web Client ID. Public by design — it ships to every visitor.
         The server checks the token's `aud` against GOOGLE_CLIENT_ID in its own
         environment; that check, not this line, is what keeps sign-in honest. -->
    <script>
      window.MM_GOOGLE_CLIENT_ID = '855738513392-oearkirn5kqjga0oq7q8emti7p7m8id8.apps.googleusercontent.com';
    </script>
    <!-- defer, not async: initGoogle() runs on window.load and needs `google`
         to already be defined. An async script may execute after load. -->
    <script src="https://accounts.google.com/gsi/client" defer></script>

    <script src="session.js?v=66"></script>
    <script src="auth.js?v=66"></script>
    <script src="feedback.js?v=64"></script>

  </body>
</html>
